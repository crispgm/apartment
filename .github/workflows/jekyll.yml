name: Jekyll site CI

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: main
          fetch-depth: 1
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: main/gh-pages
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler: "2"
          bundler-cache: true
          working-directory: main
      - run: |
          cd main
          bundle exec jekyll build --destination=./gh-pages/
      - run: |
          cd main/gh-pages
          git config --global user.name 'crispbot'
          git config --global user.email 'crispbot@users.noreply.github.com'
          git add .
          git commit --allow-empty -m "Auto published at $(date +%Y%m%d-%H:%M:%S)"
          git remote set-url --push origin https://x-access-token:${{ github.token }}@github.com/crispgm/apartment
          git push origin gh-pages
